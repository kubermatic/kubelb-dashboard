version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docs/none
      - release-note-none
      - ok-to-test
