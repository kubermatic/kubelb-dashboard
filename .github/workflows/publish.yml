name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY: quay.io
  REGISTRY_PREFIX: quay.io/kubermatic

jobs:
  dashboard:
    name: Dashboard Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY_PREFIX }}/kubelb-dashboard
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: startsWith(github.ref, 'refs/tags/v')
        run: cosign sign --yes ${{ env.REGISTRY_PREFIX }}/kubelb-dashboard@${{ steps.build.outputs.digest }}

  api:
    name: API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY_PREFIX }}/kubelb-dashboard-api
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: api
          push: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: startsWith(github.ref, 'refs/tags/v')
        run: cosign sign --yes ${{ env.REGISTRY_PREFIX }}/kubelb-dashboard-api@${{ steps.build.outputs.digest }}

  chart:
    needs: [dashboard, api]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - uses: sigstore/cosign-installer@v3

      - name: Login to Quay.io (Helm)
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | helm registry login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Login to Quay.io (cosign)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/kubelb-dashboard/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/kubelb-dashboard/Chart.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Generate helm docs
        run: make helm-docs

      - name: Package and push chart
        run: |
          CHART_NAME="kubelb-dashboard"
          VERSION="${GITHUB_REF_NAME}"
          helm package charts/${CHART_NAME}
          helm push ${CHART_NAME}-${VERSION}.tgz oci://${{ env.REGISTRY }}/kubermatic/helm-charts

      - name: Sign chart
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cosign sign --yes ${{ env.REGISTRY }}/kubermatic/helm-charts/kubelb-dashboard:${VERSION}
