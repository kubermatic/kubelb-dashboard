name: "E2E Tests (Fork)"

on:
  pull_request_target:
    branches: [main, "release/**"]
    types: [opened, reopened, synchronize, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  notify:
    name: Notify
    if: >-
      github.event.pull_request.head.repo.full_name != github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'ok-to-test') &&
      !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- ok-to-test-notice -->"
          EXISTING=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json comments --jq ".comments[].body | select(contains(\"$MARKER\"))")
          if [ -z "$EXISTING" ]; then
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "${MARKER}
          E2E tests require the \`ok-to-test\` label to run on fork PRs. A maintainer will review and add the label."
          fi

  strip-stale-label:
    name: Strip stale ok-to-test on push
    if: >-
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name != github.repository &&
      contains(github.event.pull_request.labels.*.name, 'ok-to-test') &&
      !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove ok-to-test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --remove-label ok-to-test
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "New commits pushed — \`ok-to-test\` removed. A maintainer must re-review and re-add the label before E2E runs against secrets."

  e2e:
    name: E2E Tests
    if: >-
      github.event.pull_request.head.repo.full_name != github.repository &&
      (
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) ||
        (github.event.action == 'labeled' && github.event.label.name == 'ok-to-test')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Clone kubelb-ee
        run: git clone --depth 1 --branch release/v1.3 https://x-access-token:${{ secrets.KUBELB_EE_TOKEN }}@github.com/kubermatic/kubelb-ee.git /tmp/kubelb-ee

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: /tmp/kubelb-ee/go.mod

      - name: Install tools
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64 &
          curl -Lo ./yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 &
          wait
          chmod +x ./kind ./yq
          sudo mv ./kind ./yq /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install deps and setup infra
        run: |
          (pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium) &
          PLAYWRIGHT_PID=$!
          (cd /tmp/kubelb-ee && make e2e-setup-local) &
          INFRA_PID=$!
          wait $INFRA_PID

          ./e2e/testdata/apply.sh &
          SEED_PID=$!
          wait $SEED_PID $PLAYWRIGHT_PID
        env:
          KUBECONFIGS_DIR: /tmp/kubelb-ee/.e2e-kubeconfigs

      - name: Build images
        run: |
          docker build -t kubelb-dashboard:e2e .
          docker build -t kubelb-dashboard-api:e2e api/

      - name: Load images into kind
        run: |
          kind load docker-image kubelb-dashboard:e2e --name kubelb &
          kind load docker-image kubelb-dashboard-api:e2e --name kubelb &
          wait

      - name: Deploy with Helm
        env:
          KUBECONFIG: /tmp/kubelb-ee/.e2e-kubeconfigs/kubelb.kubeconfig
        run: |
          helm install kubelb-dashboard ./charts/kubelb-dashboard \
            --set image.repository=kubelb-dashboard \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set api.image.repository=kubelb-dashboard-api \
            --set api.image.tag=e2e \
            --set api.image.pullPolicy=Never \
            --set auth.enabled=false \
            --wait --timeout 120s

      - name: Port-forward and wait for ready
        env:
          KUBECONFIG: /tmp/kubelb-ee/.e2e-kubeconfigs/kubelb.kubeconfig
        run: |
          kubectl port-forward svc/kubelb-dashboard 8080:80 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Dashboard is ready"
              break
            fi
            sleep 2
          done

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:8080
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
