name: "E2E Tests (Fork)"

on:
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  e2e:
    name: CE Smoke Tests
    if: github.event.pull_request.head.repo.full_name != github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch pinned KubeLB CE source
        env:
          KUBELB_CE_REF: 963b02983caf81d274e3bc1724c67530a65596e6
        run: |
          git init /tmp/kubelb
          git -C /tmp/kubelb remote add origin https://github.com/kubermatic/kubelb.git
          git -C /tmp/kubelb fetch --depth 1 origin "$KUBELB_CE_REF"
          git -C /tmp/kubelb checkout --detach FETCH_HEAD
          git -C /tmp/kubelb remote remove origin

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: /tmp/kubelb/go.mod

      - name: Install tools
        run: ./hack/ci/install-e2e-tools.sh

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install deps and setup CE infra
        run: |
          (pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium) &
          PLAYWRIGHT_PID=$!
          (cd /tmp/kubelb && make e2e-setup-local) &
          INFRA_PID=$!
          wait $INFRA_PID $PLAYWRIGHT_PID
        env:
          KUBECONFIGS_DIR: /tmp/kubelb/.e2e-kubeconfigs

      - name: Build images
        run: |
          docker build -t kubelb-dashboard:e2e .
          docker build -t kubelb-dashboard-api:e2e api/

      - name: Load images into kind
        run: |
          kind load docker-image kubelb-dashboard:e2e --name kubelb &
          kind load docker-image kubelb-dashboard-api:e2e --name kubelb &
          wait

      - name: Deploy with Helm
        env:
          KUBECONFIG: /tmp/kubelb/.e2e-kubeconfigs/kubelb.kubeconfig
        run: |
          helm install kubelb-dashboard ./charts/kubelb-dashboard \
            --set image.repository=kubelb-dashboard \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set api.image.repository=kubelb-dashboard-api \
            --set api.image.tag=e2e \
            --set api.image.pullPolicy=Never \
            --set auth.enabled=false \
            --wait --timeout 120s

      - name: Port-forward and wait for ready
        env:
          KUBECONFIG: /tmp/kubelb/.e2e-kubeconfigs/kubelb.kubeconfig
        run: |
          kubectl port-forward svc/kubelb-dashboard 8080:80 &
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Dashboard is ready"
              break
            fi
            sleep 2
          done

      - name: Run CE E2E tests
        run: pnpm run test:e2e -- --project=chromium-ce
        env:
          E2E_BASE_URL: http://localhost:8080
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-ce
          path: playwright-report/
          retention-days: 14
