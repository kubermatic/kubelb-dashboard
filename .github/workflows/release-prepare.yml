name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      version:
        description: Target Dashboard version without a leading v
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Fetch merged pull requests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/pulls?state=closed&per_page=100" \
            > /tmp/pulls.json

      - name: Generate release plan
        env:
          TARGET_VERSION: ${{ inputs.version }}
        run: |
          node hack/prepare-release.mjs \
            --version "$TARGET_VERSION" \
            --pulls /tmp/pulls.json \
            --dry-run \
            > release-plan.txt
          cat release-plan.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-plan-v${{ inputs.version }}
          path: release-plan.txt
          retention-days: 14
