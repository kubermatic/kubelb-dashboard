name: CI

on:
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Version consistency
        run: pnpm run version:check

      # pnpm audit re-enable once TanStack republishes patched versions and
      # GHSA-rmmr-r34h-pfm5 narrows its affected range (currently >=0 false
      # positive against our pre-attack-window pinned versions).

      - name: Verify package signatures
        run: pnpm audit signatures

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: License check
        run: pnpm run license:check

      - name: Build
        run: pnpm run build

  api:
    name: API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Verify package signatures
        run: pnpm audit signatures

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - context: .
            name: dashboard
          - context: api
            name: api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.name }}:latest
          format: table
          exit-code: 1
          severity: CRITICAL

  e2e:
    name: E2E Tests
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch pinned kubelb-ee source
        env:
          KUBELB_EE_REF: bf47e2e346f374ef0af335eab1bc5bfca9282fca
          KUBELB_EE_TOKEN: ${{ secrets.KUBELB_EE_TOKEN }}
        run: |
          git init /tmp/kubelb-ee
          git -C /tmp/kubelb-ee remote add origin https://github.com/kubermatic/kubelb-ee.git
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$KUBELB_EE_TOKEN" | base64 -w 0)"
          echo "::add-mask::$AUTH_HEADER"
          GIT_CONFIG_COUNT=1 \
            GIT_CONFIG_KEY_0=http.extraheader \
            GIT_CONFIG_VALUE_0="$AUTH_HEADER" \
            git -C /tmp/kubelb-ee fetch --depth 1 origin "$KUBELB_EE_REF"
          git -C /tmp/kubelb-ee checkout --detach FETCH_HEAD
          git -C /tmp/kubelb-ee remote remove origin
          unset AUTH_HEADER KUBELB_EE_TOKEN

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: /tmp/kubelb-ee/go.mod

      - name: Install tools
        run: ./hack/ci/install-e2e-tools.sh

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install deps and setup infra
        run: |
          (pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium) &
          PLAYWRIGHT_PID=$!
          (cd /tmp/kubelb-ee && make e2e-setup-local) &
          INFRA_PID=$!
          wait $INFRA_PID

          ./e2e/testdata/apply.sh &
          SEED_PID=$!
          wait $SEED_PID $PLAYWRIGHT_PID
        env:
          KUBECONFIGS_DIR: /tmp/kubelb-ee/.e2e-kubeconfigs

      - name: Build images
        run: |
          docker build -t kubelb-dashboard:e2e .
          docker build -t kubelb-dashboard-api:e2e api/

      - name: Load images into kind
        run: |
          kind load docker-image kubelb-dashboard:e2e --name kubelb &
          kind load docker-image kubelb-dashboard-api:e2e --name kubelb &
          wait

      - name: Deploy with Helm
        env:
          KUBECONFIG: /tmp/kubelb-ee/.e2e-kubeconfigs/kubelb.kubeconfig
        run: |
          helm install kubelb-dashboard ./charts/kubelb-dashboard \
            --set image.repository=kubelb-dashboard \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set api.image.repository=kubelb-dashboard-api \
            --set api.image.tag=e2e \
            --set api.image.pullPolicy=Never \
            --set auth.enabled=false \
            --wait --timeout 120s

      - name: Port-forward and wait for ready
        env:
          KUBECONFIG: /tmp/kubelb-ee/.e2e-kubeconfigs/kubelb.kubeconfig
        run: |
          kubectl port-forward svc/kubelb-dashboard 8080:80 &
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Dashboard is ready"
              break
            fi
            sleep 2
          done

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:8080
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
