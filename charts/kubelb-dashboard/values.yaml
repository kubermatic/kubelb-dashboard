# -- Number of replicas
replicaCount: 1

image:
  # -- Dashboard (nginx) image repository
  repository: ghcr.io/kubermatic/kubelb-dashboard
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

api:
  image:
    # -- API server image repository
    repository: ghcr.io/kubermatic/kubelb-dashboard-api
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to chart appVersion)
    tag: ""
  # -- API server CPU/memory resource requests and limits
  resources: {}

auth:
  # -- Enable OIDC authentication
  enabled: false
  oidc:
    # -- OIDC provider issuer URL (e.g. https://dex.example.com)
    issuerUrl: ""
    # -- OIDC client ID
    clientId: ""
    # -- OIDC client secret (ignored if existingSecret is set)
    clientSecret: ""
    # -- Override redirect URI (auto-derived from ingress if empty)
    redirectUri: ""
    # -- Space-separated OIDC scopes
    scopes: "openid email profile groups offline_access"
  session:
    # -- Session cookie encryption secret, 32+ chars (auto-generated if empty, ignored if existingSecret is set)
    secret: ""
    # -- Session cookie max age in seconds
    maxAge: 86400
  # -- Use existing Secret for clientSecret and sessionSecret keys
  existingSecret: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override release name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a service account
  create: true
  # -- Automount service account token
  automount: true
  # -- Service account annotations
  annotations: {}
  # -- Service account name (generated if empty)
  name: ""

rbac:
  # -- Create RBAC resources (ClusterRole + ClusterRoleBinding)
  create: true

# -- Pod annotations
podAnnotations: {}
# -- Pod labels
podLabels: {}

podSecurityContext:
  # -- Run as non-root user
  runAsNonRoot: true
  # -- User ID (101 = nginx)
  runAsUser: 101
  # -- Group ID
  runAsGroup: 101
  # -- Filesystem group
  fsGroup: 101
  seccompProfile:
    # -- Seccomp profile type
    type: RuntimeDefault

securityContext:
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false
  # -- Read-only root filesystem
  readOnlyRootFilesystem: true
  capabilities:
    # -- Drop all capabilities
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration
  tls: []

# -- Dashboard (nginx) CPU/memory resource requests and limits
resources: {}

autoscaling:
  # -- Enable horizontal pod autoscaler
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80

# -- Node selector
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}
