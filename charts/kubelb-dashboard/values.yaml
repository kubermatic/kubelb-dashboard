# -- Number of replicas
replicaCount: 1

image:
  # -- Dashboard (nginx) image repository
  repository: quay.io/kubermatic/kubelb-dashboard
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

api:
  image:
    # -- API server image repository
    repository: quay.io/kubermatic/kubelb-dashboard-api
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to chart appVersion)
    tag: ""
  # -- API server CPU/memory resource requests and limits
  resources: {}

kubeconfig:
  # -- Existing Secret containing a kubeconfig file (for out-of-cluster access)
  existingSecret: ""
  # -- Key inside the Secret that holds the kubeconfig file
  key: kubeconfig

auth:
  # -- Enable OIDC authentication
  enabled: false
  oidc:
    # -- OIDC provider issuer URL (e.g. https://dex.example.com)
    issuerUrl: ""
    # -- OIDC client ID
    clientId: ""
    # -- OIDC client secret (ignored if existingSecret is set)
    clientSecret: ""
    # -- Override redirect URI (auto-derived from ingress if empty)
    redirectUri: ""
    # -- Space-separated OIDC scopes
    scopes: "openid email profile groups offline_access"
  session:
    # -- Session cookie encryption secret, 32+ chars (auto-generated if empty, ignored if existingSecret is set)
    secret: ""
    # -- Session cookie max age in seconds
    maxAge: 86400
  # -- Use existing Secret for clientSecret and sessionSecret keys
  existingSecret: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override release name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a service account
  create: true
  # -- Automount service account token
  automount: true
  # -- Service account annotations
  annotations: {}
  # -- Service account name (generated if empty)
  name: ""

rbac:
  # -- Create RBAC resources (ClusterRole + ClusterRoleBinding)
  create: true

# -- Run the dashboard in read-only mode. The API server rejects mutating
# requests to the Kubernetes API and the UI hides all create/edit/delete
# controls. When `rbac.create` is true, the ClusterRole is also narrowed to
# read-only verbs (defense-in-depth).
readOnly: false

# Watch streams resource updates instead of polling every 15s. Disabled by
# default; enable per-deployment once validated against your cluster. Falls
# back to polling automatically if the watch stream fails.
watch:
  # -- Enable Kubernetes watch streaming for resource lists
  enabled: false
# Per-proxy traffic metrics. Point at a Prometheus that scrapes the KubeLB
# Envoy proxies (in-cluster URL). When prometheusUrl is empty and autoDiscover
# is true, the dashboard probes well-known Prometheus locations and uses one that
# exposes the Envoy series. When neither yields a usable target, metrics are hidden.
metrics:
  # -- Prometheus base URL, e.g. http://prometheus.monitoring.svc:9090
  prometheusUrl: ""
  # -- Auto-discover Prometheus when prometheusUrl is empty (explicit URL always wins)
  autoDiscover: true

# Live traffic view (Hubble). Point at the Hubble Relay gRPC endpoint (Cilium).
# When hubbleRelayAddress is empty and autoDiscover is true, the dashboard finds
# the hubble-relay Service (any namespace) itself. Otherwise the Traffic view is hidden.
traffic:
  # -- Hubble Relay address, e.g. hubble-relay.kube-system.svc:80
  hubbleRelayAddress: ""
  # -- Auto-discover Hubble Relay when hubbleRelayAddress is empty (explicit address always wins)
  autoDiscover: true

# -- Pod annotations
podAnnotations: {}
# -- Pod labels
podLabels: {}

podSecurityContext:
  # -- Run as non-root user
  runAsNonRoot: true
  # -- User ID (101 = nginx)
  runAsUser: 101
  # -- Group ID
  runAsGroup: 101
  # -- Filesystem group
  fsGroup: 101
  seccompProfile:
    # -- Seccomp profile type
    type: RuntimeDefault

securityContext:
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false
  # -- Read-only root filesystem
  readOnlyRootFilesystem: true
  capabilities:
    # -- Drop all capabilities
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration
  tls: []

httpRoute:
  # -- Enable HTTPRoute (Gateway API v1). Independent of `ingress.enabled` — both may be on simultaneously.
  enabled: false
  # -- HTTPRoute annotations
  annotations: {}
  # -- HTTPRoute parentRefs. Each entry: {name, namespace?, sectionName?, port?}
  parentRefs: []
  # -- HTTPRoute hostnames
  hostnames: []
  # -- Override default routing rules. If empty, a single rule routes PathPrefix `/` to the chart's Service on `service.port`.
  rules: []

# -- Dashboard (nginx) CPU/memory resource requests and limits
resources: {}

autoscaling:
  # -- Enable horizontal pod autoscaler
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80

# -- Node selector
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}
