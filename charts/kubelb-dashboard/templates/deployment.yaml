apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubelb-dashboard.fullname" . }}
  labels:
    {{- include "kubelb-dashboard.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kubelb-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubelb-dashboard.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubelb-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: dashboard
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
        - name: api
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 3001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- if or .Values.kubeconfig.existingSecret .Values.auth.enabled }}
          env:
          {{- if .Values.kubeconfig.existingSecret }}
            - name: KUBECONFIG
              value: /etc/kubelb/kubeconfig
          {{- end }}
          {{- if .Values.auth.enabled }}
            - name: OIDC_ISSUER
              value: {{ required "auth.oidc.issuerUrl is required when auth.enabled=true" .Values.auth.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ required "auth.oidc.clientId is required when auth.enabled=true" .Values.auth.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (printf "%s-auth" (include "kubelb-dashboard.fullname" .)) }}
                  key: clientSecret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (printf "%s-auth" (include "kubelb-dashboard.fullname" .)) }}
                  key: sessionSecret
            {{- if .Values.auth.oidc.redirectUri }}
            - name: OIDC_REDIRECT_URI
              value: {{ .Values.auth.oidc.redirectUri | quote }}
            {{- end }}
            {{- if ne .Values.auth.oidc.scopes "openid email profile groups" }}
            - name: OIDC_SCOPES
              value: {{ .Values.auth.oidc.scopes | quote }}
            {{- end }}
            {{- if ne (int .Values.auth.session.maxAge) 86400 }}
            - name: SESSION_MAX_AGE
              value: {{ .Values.auth.session.maxAge | quote }}
            {{- end }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.kubeconfig.existingSecret }}
            - name: kubeconfig
              mountPath: /etc/kubelb
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        {{- if .Values.kubeconfig.existingSecret }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.existingSecret }}
            items:
              - key: {{ .Values.kubeconfig.key }}
                path: kubeconfig
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
