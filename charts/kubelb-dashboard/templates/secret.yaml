{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubelb-dashboard.fullname" . }}-auth
  labels:
    {{- include "kubelb-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  clientSecret: {{ required "auth.oidc.clientSecret is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.oidc.clientSecret | b64enc | quote }}
  sessionSecret: {{ required "auth.session.secret is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.session.secret | b64enc | quote }}
{{- end }}
