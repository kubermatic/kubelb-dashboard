{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
{{- $secretName := printf "%s-auth" (include "kubelb-dashboard.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kubelb-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  clientSecret: {{ required "auth.oidc.clientSecret is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.oidc.clientSecret | b64enc | quote }}
  {{- if .Values.auth.session.secret }}
  sessionSecret: {{ .Values.auth.session.secret | b64enc | quote }}
  {{- else if and $existingSecret $existingSecret.data }}
  sessionSecret: {{ index $existingSecret.data "sessionSecret" }}
  {{- else }}
  sessionSecret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
{{- end }}
