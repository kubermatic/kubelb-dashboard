{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubelb-dashboard.fullname" . }}
  labels:
    {{- include "kubelb-dashboard.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubelb.k8c.io"]
    resources: ["tenants", "configs", "syncsecrets", "wafpolicies", "loadbalancers", "routes", "addresses"]
    {{- if .Values.readOnly }}
    verbs: ["get", "list", "watch"]
    {{- else }}
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    {{- end }}
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "services", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "grpcroutes", "tcproutes", "tlsroutes", "udproutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["backendtrafficpolicies", "clienttrafficpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubelb-dashboard.fullname" . }}
  labels:
    {{- include "kubelb-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubelb-dashboard.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubelb-dashboard.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
